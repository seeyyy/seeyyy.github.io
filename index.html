<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCPM 41 — Rencana Belajar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EDEAE0;
    --surface:#FFFFFF;
    --surface-2:#F6F4EC;
    --ink:#16213D;
    --ink-soft:#5B6480;
    --ink-faint:#8A92A8;
    --maroon:#005596;
    --maroon-deep:#002E52;
    --gold:#A6790B;
    --gold-soft:#D9B45C;
    --teal:#2F6E66;
    --teal-soft:#DCEAE7;
    --line:#D8D2C2;
    --line-strong:#BBB39E;
    --radius:12px;
    --radius-sm:8px;
    --shadow: 0 2px 10px rgba(22,33,61,0.08);
    --shadow-lg: 0 8px 28px rgba(22,33,61,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{font-family:'Fraunces', serif; margin:0; letter-spacing:-0.01em;}
  .mono{font-family:'IBM Plex Mono', monospace;}
  a{color:inherit;}
  button{font-family:inherit; cursor:pointer;}
  input[type="text"],input[type="number"]{font-family:inherit;}

  /* ===== Header ===== */
  header.app-header{
    position:relative;
    background:var(--maroon-deep);
    color:#F3EEE2;
    padding:28px 20px 22px;
    overflow:hidden;
  }
  header.app-header::before{
    content:"";
    position:absolute; inset:0;
    background-image: repeating-radial-gradient(circle at 0 0, transparent 0, rgba(217,180,92,0.12) 1.5px, transparent 2.5px, transparent 9px);
    opacity:0.9;
    pointer-events:none;
  }
  .header-inner{position:relative; max-width:980px; margin:0 auto;}
  .header-logo-badge{
    display:inline-flex; align-items:center;
    background:#fff; padding:9px 16px; border-radius:10px;
    box-shadow:0 4px 16px rgba(0,0,0,0.22);
    margin-bottom:14px;
  }
  .header-logo-badge img{height:26px; width:auto; display:block;}
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--gold-soft); margin-bottom:6px;
  }
  header.app-header h1{font-size:clamp(22px,4vw,32px); font-weight:600; color:#FBF7EC;}
  header.app-header p.tag{margin:6px 0 0; font-size:13.5px; color:#D8CFC0; max-width:560px;}
  .header-meta{
    margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;
  }
  .meta-pill{
    font-family:'IBM Plex Mono', monospace; font-size:11.5px;
    background:rgba(255,255,255,0.08); border:1px solid rgba(217,180,92,0.35);
    color:#F1E6CD; padding:5px 10px; border-radius:999px;
  }

  /* ===== Tabs ===== */
  nav.tabs{
    position:sticky; top:0; z-index:20;
    background:var(--bg);
    border-bottom:1px solid var(--line-strong);
    display:flex; gap:6px; overflow-x:auto;
    padding:10px 14px;
    max-width:980px; margin:0 auto;
  }
  nav.tabs::-webkit-scrollbar{height:0px;}
  .tab-btn{
    flex:0 0 auto;
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--ink-soft);
    font-size:13px; font-weight:600;
    padding:9px 14px; border-radius:999px;
    white-space:nowrap;
    transition:all .15s ease;
  }
  .tab-btn .count{
    font-family:'IBM Plex Mono', monospace; font-weight:500; font-size:11px;
    color:var(--ink-faint); margin-left:6px;
  }
  .tab-btn.active{
    background:var(--ink); color:#fff; border-color:var(--ink);
    box-shadow:var(--shadow);
  }
  .tab-btn.active .count{color:var(--gold-soft);}

  main{max-width:980px; margin:0 auto; padding:20px 16px 80px;}
  .tab-panel{display:none; animation:fadeIn .25s ease;}
  .tab-panel.active{display:block;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}

  /* ===== Cards / generic ===== */
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px;
    box-shadow:var(--shadow);
  }
  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .grid-3{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
  @media (max-width:720px){ .grid-2,.grid-3{grid-template-columns:1fr;} }

  .section-title{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--maroon); margin:0 0 10px;}

  .progress-bar{height:8px; border-radius:99px; background:var(--surface-2); border:1px solid var(--line); overflow:hidden;}
  .progress-fill{height:100%; background:linear-gradient(90deg,var(--maroon),var(--gold)); border-radius:99px; transition:width .35s ease;}

  /* ===== Dashboard ===== */
  .today-card{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:14px; margin-bottom:16px;}
  .today-left .date-big{font-family:'Fraunces',serif; font-size:22px; font-weight:600;}
  .today-left .date-sub{font-size:12.5px; color:var(--ink-soft); margin-top:2px;}
  .today-badges{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;}
  .badge{font-size:10.5px; font-family:'IBM Plex Mono',monospace; padding:3px 8px; border-radius:6px; font-weight:600;}
  .badge.sun{background:var(--surface-2); color:var(--ink-faint); border:1px solid var(--line);}
  .badge.skripsi{background:#EFE3D9; color:#8A5A22; border:1px solid #E0C9A8;}
  .badge.event{background:var(--maroon); color:#fff;}
  .today-check{display:flex; align-items:center; gap:8px; font-size:13px;}

  .overall-wrap{margin-bottom:18px;}
  .overall-row{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;}
  .overall-row .num{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--ink-soft);}

  .tahap-mini{padding:14px; border-radius:var(--radius-sm); background:var(--surface-2); border:1px solid var(--line);}
  .tahap-mini h4{font-size:14.5px; margin-bottom:4px;}
  .tahap-mini .frac{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft); margin-bottom:8px;}
  .tahap-mini .pace{font-size:11.5px; color:var(--maroon); margin-top:8px; line-height:1.4;}
  .tahap-mini .deadline{font-size:11px; color:var(--ink-faint); margin-top:4px;}

  /* tickets */
  .ticket-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; margin-top:10px;}
  .ticket{
    display:flex; background:var(--surface);
    border:1px dashed var(--line-strong); border-radius:var(--radius-sm);
    overflow:hidden;
  }
  .ticket.next{border-color:var(--maroon); box-shadow:var(--shadow-lg);}
  .ticket-date{
    flex:0 0 64px; background:var(--ink); color:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono',monospace;
  }
  .ticket-date .d{font-size:20px; font-weight:600; line-height:1;}
  .ticket-date .m{font-size:9.5px; letter-spacing:0.06em; text-transform:uppercase; margin-top:2px;}
  .ticket-body{padding:9px 11px; flex:1; position:relative;}
  .ticket-body .lbl{font-size:12.5px; font-weight:600; line-height:1.25;}
  .ticket-body .range{font-size:10.5px; color:var(--ink-faint); margin-top:3px; font-family:'IBM Plex Mono',monospace;}
  .ticket-body .hbadge{position:absolute; top:8px; right:9px; font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:700; color:var(--maroon);}

  .scenario-toggle{display:flex; gap:8px; margin-top:10px;}
  .scenario-opt{flex:1; border:1px solid var(--line); border-radius:var(--radius-sm); padding:10px 12px; background:var(--surface); font-size:12.5px;}
  .scenario-opt input{margin-right:7px;}
  .scenario-opt.selected{border-color:var(--maroon); background:#FBF1F1;}

  .info-callout{background:var(--teal-soft); border:1px solid #BBD8D2; border-radius:var(--radius-sm); padding:12px 14px; font-size:12.5px; color:#1F4E47; margin-top:14px;}
  .info-callout b{color:var(--teal);}

  .reset-row{margin-top:22px; text-align:right;}
  .btn-ghost{background:none; border:1px solid var(--line-strong); color:var(--ink-faint); font-size:11.5px; padding:7px 12px; border-radius:999px;}
  .btn-ghost.danger{color:var(--maroon);}

  .roadmap-row{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .roadmap-label{flex:0 0 58px; font-size:12px; font-weight:600;}
  .roadmap-track{flex:1; height:20px; background:var(--surface-2); border-radius:6px; position:relative;}
  .roadmap-bar{position:absolute; top:0; left:0; height:100%; border-radius:6px; opacity:0.88;}
  .roadmap-bar[data-tahap="tahap1"]{background:var(--maroon);}
  .roadmap-bar[data-tahap="tahap2"]{background:var(--teal);}
  .roadmap-bar[data-tahap="tahap3"]{background:var(--gold);}
  .roadmap-marker{position:absolute; top:-4px; width:2px; height:28px; background:var(--ink);}
  .roadmap-today-line{position:absolute; top:0; bottom:0; width:0; border-left:2px dashed var(--ink); opacity:0.45;}
  .roadmap-dates{display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-faint); margin-top:2px; padding-left:68px;}

  /* ===== Tahap tabs ===== */
  .tahap-head{display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:10px; margin-bottom:14px;}
  .tahap-head h2{font-size:21px;}
  .tahap-head .sub{font-size:12.5px; color:var(--ink-soft); margin-top:2px;}
  .tahap-head .total-frac{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--maroon); font-weight:600;}

  .category{margin-bottom:14px; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; background:var(--surface);}
  .category-head{display:flex; align-items:center; gap:12px; padding:12px 16px; cursor:pointer; user-select:none; background:var(--surface-2);}
  .category-head .step-tag{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ink-faint); border:1px solid var(--line-strong); padding:2px 6px; border-radius:5px;}
  .category-head h3{font-size:14.5px; flex:1;}
  .category-head .cfrac{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft); white-space:nowrap;}
  .category-head .chev{transition:transform .2s ease; color:var(--ink-faint); font-size:12px;}
  .category.collapsed .chev{transform:rotate(-90deg);}
  .category-bar{height:5px; background:var(--line);}
  .category-bar-fill{height:100%; background:var(--gold);}
  .item-list{display:grid; grid-template-columns:repeat(2,1fr); gap:0;}
  @media (max-width:640px){ .item-list{grid-template-columns:1fr;} }
  .category.collapsed .item-list{display:none;}
  .item-row{display:flex; align-items:center; gap:10px; padding:9px 16px; border-top:1px solid var(--line); font-size:13px;}
  .item-row label{display:flex; align-items:center; gap:10px; cursor:pointer; width:100%;}
  .stamp{
    flex:0 0 18px; width:18px; height:18px; border-radius:50%;
    border:2px solid var(--line-strong); position:relative; transition:all .15s ease;
  }
  input.item-checkbox{position:absolute; opacity:0; width:18px; height:18px; margin:0; cursor:pointer;}
  .item-row input.item-checkbox:checked + .stamp{
    background:var(--maroon); border-color:var(--maroon); transform:scale(1.05);
  }
  .item-row input.item-checkbox:checked + .stamp::after{
    content:"✓"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:11px; font-weight:700;
  }
  .item-row .item-label{color:var(--ink); transition:color .15s ease;}
  .item-row input.item-checkbox:checked ~ .item-label{color:var(--ink-faint); text-decoration:line-through;}

  /* ===== Weekly ===== */
  .week-card{border:1px solid var(--line); border-radius:var(--radius); margin-bottom:10px; overflow:hidden; background:var(--surface);}
  .week-head{display:flex; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; background:var(--surface-2);}
  .week-head .wnum{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-faint); border:1px solid var(--line-strong); padding:2px 7px; border-radius:5px;}
  .week-head .wrange{font-weight:600; font-size:13.5px; flex:1;}
  .week-head .wstat{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--ink-soft);}
  .week-card.current .week-head{background:#FBF1E0; }
  .week-card.collapsed .week-body{display:none;}
  .week-head .chev{color:var(--ink-faint); font-size:12px; transition:transform .2s;}
  .week-card.collapsed .chev{transform:rotate(-90deg);}
  .day-row{padding:9px 14px; border-top:1px solid var(--line); font-size:12.5px;}
  .day-row.is-libur{background:#F8F6F1;}
  .day-row-top{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:6px;}
  .day-row .dname{font-family:'IBM Plex Mono',monospace; font-size:11.5px; flex:0 0 56px; color:var(--ink-soft); font-weight:600;}
  .day-row .spacer{flex:1;}
  .day-badges{display:flex; gap:4px; flex-wrap:wrap;}
  .day-input-num{width:48px; border:1px solid var(--line); border-radius:6px; padding:4px 6px; font-size:12px;}
  .note-input{width:100%; border:1px solid var(--line); border-radius:6px; padding:5px 8px; font-size:12px; margin-top:2px;}
  .day-summary{font-size:11px; color:var(--ink-soft); font-style:italic; margin:5px 0 6px;}
  .focus-row{display:flex; align-items:center; gap:8px; margin:5px 0;}
  .focus-row .ftag{font-family:'IBM Plex Mono',monospace; font-size:10.5px; font-weight:700; color:var(--ink-soft); flex:0 0 20px;}
  .focus-select{flex:1; font-size:11.5px; border:1px solid var(--line); border-radius:6px; padding:5px 6px; background:var(--surface); font-family:inherit; color:var(--ink); max-width:340px;}
  .day-checkbox{width:18px; height:18px; flex:0 0 auto;}
  .tag-chips{display:flex; gap:5px; flex-wrap:wrap;}
  .tag-chip{font-size:10.5px; padding:3px 9px; border-radius:999px; border:1px solid var(--line-strong); background:var(--surface); color:var(--ink-faint); font-weight:600;}
  .tag-chip[data-tag="skripsi"].active{background:#EFE3D9; color:#8A5A22; border-color:#E0C9A8;}
  .tag-chip[data-tag="tahap1"].active{background:#E1ECF5; color:var(--maroon); border-color:#BBD3E8;}
  .tag-chip[data-tag="tahap2"].active{background:var(--teal-soft); color:var(--teal); border-color:#BBD8D2;}
  .tag-chip[data-tag="tahap3"].active{background:#F4E9D2; color:#8A6A14; border-color:#E6D2A0;}
  .tag-chip[data-tag="tryout"].active{background:#EDE3F5; color:#6B3FA0; border-color:#D8C2EC;}
  .tag-chip[data-tag="libur"].active{background:var(--surface-2); color:var(--ink-faint); border-color:var(--line-strong);}
  .gcal-link{display:inline-block; margin-top:6px; font-size:10px; font-family:'IBM Plex Mono',monospace; color:var(--maroon); text-decoration:none; border-bottom:1px dotted var(--maroon);}

  /* ===== Timetable ===== */
  .tt-nav{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
  .tt-nav input[type="date"]{border:1px solid var(--line); border-radius:8px; padding:7px 10px; font-family:inherit; font-size:13px;}
  .tt-row{display:flex; gap:14px; padding:11px 0; border-top:1px solid var(--line);}
  .tt-row:first-child{border-top:none;}
  .tt-row.fixed .tt-time{color:var(--maroon);}
  .tt-time{flex:0 0 96px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--ink-soft); font-weight:600; padding-top:1px;}
  .tt-label{font-size:13.5px; font-weight:600;}
  .tt-sub{font-size:11.5px; color:var(--ink-faint); margin-top:2px;}

  /* ===== Kalender (month grid widget) ===== */
  .cal-nav{display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap;}
  .cal-nav h2{font-size:18px; flex:0 0 auto; min-width:150px; text-align:center;}
  .cal-nav .spacer{flex:1;}
  .cal-legend{display:flex; gap:10px; flex-wrap:wrap; font-size:10.5px; color:var(--ink-soft); margin-bottom:12px;}
  .cal-legend-item{display:flex; align-items:center; gap:4px;}
  .cal-legend-dot{width:8px; height:8px; border-radius:50%;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
  .cal-dow{background:var(--surface-2); text-align:center; font-size:10px; font-weight:700; padding:6px 0; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.04em;}
  .cal-cell{background:var(--surface); min-height:78px; padding:5px 5px 6px; position:relative; cursor:pointer;}
  .cal-cell.outside{background:var(--surface-2); opacity:0.45;}
  .cal-cell.no-data{cursor:default;}
  .cal-cell.today{box-shadow:inset 0 0 0 2px var(--maroon);}
  .cal-date{font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:11.5px; color:var(--ink-soft);}
  .cal-dots{display:flex; gap:3px; flex-wrap:wrap; margin-top:3px;}
  .cal-dot{width:6px; height:6px; border-radius:50%; flex:0 0 auto;}
  .cal-dot[data-tag="skripsi"]{background:#C99A4E;}
  .cal-dot[data-tag="tahap1"]{background:var(--maroon);}
  .cal-dot[data-tag="tahap2"]{background:var(--teal);}
  .cal-dot[data-tag="tahap3"]{background:var(--gold);}
  .cal-dot[data-tag="tryout"]{background:#8A4FC2;}
  .cal-sub{font-size:9px; line-height:1.25; color:var(--ink-faint); margin-top:3px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .cal-event{font-size:8.5px; background:var(--maroon); color:#fff; border-radius:4px; padding:1px 4px; margin-top:3px; display:inline-block; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  @media (max-width:640px){
    .cal-cell{min-height:56px; padding:4px;}
    .cal-sub{display:none;}
    .cal-dow{font-size:9px;}
  }

  /* ===== Pomodoro ===== */
  .pomo-wrap{display:flex; flex-direction:column; align-items:center; padding:28px 16px;}
  .pomo-mode{font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; padding:5px 14px; border-radius:999px; margin-bottom:14px; font-weight:700;}
  .pomo-mode.work{background:#F6E2E5; color:var(--maroon);}
  .pomo-mode.short{background:var(--teal-soft); color:var(--teal);}
  .pomo-mode.long{background:#F4E9D2; color:var(--gold);}
  .pomo-mode.idle{background:var(--surface-2); color:var(--ink-faint);}
  .pomo-time{font-family:'IBM Plex Mono',monospace; font-size:clamp(56px,14vw,84px); font-weight:600; line-height:1; color:var(--ink);}
  .pomo-sub{font-size:12.5px; color:var(--ink-soft); margin-top:8px;}
  .pomo-controls{display:flex; gap:10px; margin-top:22px; flex-wrap:wrap; justify-content:center;}
  .btn{border:none; border-radius:999px; padding:11px 22px; font-size:13.5px; font-weight:600;}
  .btn-primary{background:var(--maroon); color:#fff;}
  .btn-secondary{background:var(--surface-2); color:var(--ink); border:1px solid var(--line-strong);}
  .pomo-settings{margin-top:26px; width:100%; max-width:460px;}
  .pomo-settings .row{display:flex; gap:10px; margin-bottom:8px;}
  .pomo-settings label{flex:1; font-size:11.5px; color:var(--ink-soft);}
  .pomo-settings input{width:100%; margin-top:3px; border:1px solid var(--line); border-radius:6px; padding:6px 8px; font-size:13px;}
  .classic-btn{margin-top:8px; font-size:11.5px; background:none; border:1px dashed var(--line-strong); border-radius:6px; padding:6px 10px; color:var(--ink-soft); width:100%;}
  .pomo-note{font-size:12px; color:var(--ink-faint); margin-top:18px; max-width:480px; text-align:center; line-height:1.5;}

  /* toast */
  #toast{position:fixed; bottom:18px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; padding:10px 18px; border-radius:999px; font-size:12.5px; opacity:0; pointer-events:none; transition:all .25s ease; z-index:50;}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

/* ================= STATE / STORAGE ================= */
function defaultPomodoro(){ return {work:50, short:10, long:30, cyclesBeforeLong:4}; }
function defaultState(){
  return { scenario:'agustus', items:{}, days:{}, pomodoro:defaultPomodoro() };
}
let state = defaultState();
let storageOK = true;
let saveTimer = null;

/* Storage abstraction: pakai window.storage Claude kalau tersedia (jalan di dalam
   Claude.ai), atau jatuh ke localStorage kalau file ini di-deploy mandiri di luar
   Claude.ai (mis. di-hosting sendiri). Supaya satu file yang sama tetap bisa
   menyimpan progres di kedua skenario. */
const hasClaudeStorage = (typeof window!=='undefined') && window.storage && typeof window.storage.get==='function';
async function storageGet(key){
  if(hasClaudeStorage){
    try{ return await window.storage.get(key, false); }catch(e){ return null; }
  }
  try{
    const raw = localStorage.getItem(key);
    return raw!=null ? {key, value:raw} : null;
  }catch(e){ return null; }
}
async function storageSet(key, value){
  if(hasClaudeStorage){
    return await window.storage.set(key, value, false);
  }
  localStorage.setItem(key, value);
  return {key, value};
}

async function loadState(){
  try{
    const res = await storageGet('pcpm41-state');
    if(res && res.value){
      const loaded = JSON.parse(res.value);
      state = Object.assign(defaultState(), loaded);
      state.pomodoro = Object.assign(defaultPomodoro(), loaded.pomodoro || {});
      state.items = loaded.items || {};
      state.days = loaded.days || {};
    }
  }catch(e){
    // first run / no key yet — keep defaults
  }
}
function scheduleSave(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{ await storageSet('pcpm41-state', JSON.stringify(state)); storageOK=true; }
    catch(e){ storageOK=false; showToast('Gagal menyimpan progres — coba lagi sebentar lagi'); }
  }, 450);
}

/* ================= UTILS ================= */
function pad(n){return String(n).padStart(2,'0');}
function toKey(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function parseKey(s){const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d);}
function addDays(d,n){const r=new Date(d); r.setDate(r.getDate()+n); return r;}
function startOfDay(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function diffDays(a,b){return Math.round((startOfDay(a)-startOfDay(b))/86400000);}
function fmtDate(d){return `${d.getDate()} ${MONTHS_ID[d.getMonth()]} ${d.getFullYear()}`;}
function fmtDateShort(d){return `${d.getDate()} ${MONTHS_ID[d.getMonth()].slice(0,3)}`;}
function today(){return startOfDay(new Date());}
function slug(s){return s.toLowerCase().replace(/\s+/g,'-');}
function escapeHtml(s){return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(showToast._h);
  showToast._h=setTimeout(()=>t.classList.remove('show'),2200);
}

function currentEvents(){ return scenarios[state.scenario]; }
function findEvent(label){ return currentEvents().find(e=>e.label===label); }
function getDeadline(tahap){
  const ev = findEvent(TAHAP_META[tahap].anchorLabel);
  return addDays(parseKey(ev.start), -1);
}
function countStudyDaysInclusive(fromDate, toDate){
  let count=0, d=startOfDay(fromDate); const end=startOfDay(toDate);
  if(d>end) return 0;
  while(d<=end){ if(d.getDay()!==0) count++; d=addDays(d,1); }
  return count;
}

/* ================= PROGRESS CALC ================= */
function countChecked(tahap, cat){
  return ITEMS.filter(it=>it.tahap===tahap && (!cat||it.cat===cat) && state.items[it.id]).length;
}
function countTotal(tahap, cat){
  return ITEMS.filter(it=>it.tahap===tahap && (!cat||it.cat===cat)).length;
}
function overallChecked(){ return Object.values(state.items).filter(Boolean).length; }

/* ================= WEEKS (static) ================= */
function buildWeeks(){
  const weeks=[];
  let cursor = parseKey(PLAN_START);
  const end = parseKey(PLAN_END);
  while(cursor<=end){
    const days=[];
    for(let i=0;i<7;i++){
      const d = addDays(cursor,i);
      const key = toKey(d);
      days.push({ key, date:d, dow:DAYS_ID[d.getDay()], isSunday:d.getDay()===0, isSkripsi:(key>=SKRIPSI_START && key<=SKRIPSI_END) });
    }
    weeks.push({ start:cursor, end:addDays(cursor,6), days });
    cursor = addDays(cursor,7);
  }
  return weeks;
}
const WEEKS = buildWeeks();
const DAY_META_BY_KEY = {};
WEEKS.forEach(w=>w.days.forEach(d=>DAY_META_BY_KEY[d.key]=d));

function eventsOnDate(key){
  return currentEvents().filter(ev => key>=ev.start && key<=(ev.end||ev.start));
}
function dayRecord(key){
  if(!state.days[key]) state.days[key]={studied:false,pomodoro:0,note:'',cyclesSinceLong:0};
  return state.days[key];
}

/* ================= DAY TAGS (user-editable "apa yang dipelajari hari ini") ================= */
const TAG_DEFS = [
  {id:'skripsi', label:'Skripsi'},
  {id:'tahap1', label:'Tahap 1'},
  {id:'tahap2', label:'Tahap 2'},
  {id:'tahap3', label:'Tahap 3'},
  {id:'tryout', label:'Tryout & Review'},
  {id:'libur', label:'Libur'}
];
function computeDefaultTags(dayMeta){
  if(!dayMeta) return [];
  if(dayMeta.isSunday) return ['libur'];
  if(dayMeta.isSkripsi) return ['skripsi','tahap1','tahap2'];
  if(dayMeta.dow==='Sabtu') return ['tryout','tahap1','tahap2'];
  return ['tahap1','tahap2'];
}
function getDayTags(dayMeta){
  if(!dayMeta) return [];
  const rec = state.days[dayMeta.key];
  if(rec && Array.isArray(rec.tags)) return rec.tags;
  return computeDefaultTags(dayMeta);
}
function toggleDayTag(key, tagId){
  const dayMeta = DAY_META_BY_KEY[key];
  const rec = dayRecord(key);
  if(!Array.isArray(rec.tags)) rec.tags = computeDefaultTags(dayMeta).slice();
  const idx = rec.tags.indexOf(tagId);
  if(idx>=0) rec.tags.splice(idx,1); else rec.tags.push(tagId);
  scheduleSave();
}
function renderTagChips(key, tags){
  return TAG_DEFS.map(t=>`<button type="button" class="tag-chip ${tags.includes(t.id)?'active':''}" data-action="toggle-tag" data-key="${key}" data-tag="${t.id}">${t.label}</button>`).join('');
}

/* ================= GOOGLE CALENDAR QUICK-ADD ================= */
function gcalLink(label, startKey, endKey){
  const s = startKey.replace(/-/g,'');
  const endExclusive = addDays(parseKey(endKey||startKey),1);
  const e = toKey(endExclusive).replace(/-/g,'');
  const text = encodeURIComponent('PCPM 41 — '+label);
  const details = encodeURIComponent('Dari Rencana Belajar PCPM 41 (skenario '+(state.scenario==='agustus'?'Agustus, worst case':'September, moderat')+'). Jadwal masih tentative, cek ulang saat ada pengumuman resmi.');
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${s}/${e}&details=${details}`;
}

  let studiedDays=0, activeDays=0;
  week.days.forEach(d=>{

    if(!getDayTags(d).includes('libur')) activeDays++;
  });
  return `${studiedDays}/${activeDays} hari aktif tercentang`;
}

  const t = today();

/* ================= RENDER: KALENDER (month grid widget) ================= */
let calViewYear = null, calViewMonth = null; // calViewMonth: 0-indexed

function mondayIndex(date){ return (date.getDay()+6)%7; } // Senin=0 ... Minggu=6

function renderCalendar(){
  if(calViewYear==null){
    const base = parseKey(clampToPlanRange(toKey(today())));
    calViewYear = base.getFullYear(); calViewMonth = base.getMonth();
  }
  const monthStart = new Date(calViewYear, calViewMonth, 1);
  const gridStart = addDays(monthStart, -mondayIndex(monthStart));
  const todayKey = toKey(today());
  const dowCols = ['Sen','Sel','Rab','Kam','Jum','Sab','Min'];

  let cells = '';
  for(let i=0;i<42;i++){
    const d = addDays(gridStart, i);
    const key = toKey(d);
    const dayMeta = DAY_META_BY_KEY[key];
    const outside = d.getMonth()!==calViewMonth;
    const isToday = key===todayKey;

/* ================= RENDER: JADWAL HARIAN (TIMETABLE) ================= */
let ttSelectedKey = null;

function clampToPlanRange(key){
  if(key < PLAN_START) return PLAN_START;
  if(key > PLAN_END) return PLAN_END;
  return key;
}

function fmtClock(totalMin){
  totalMin = Math.max(0, Math.round(totalMin));
  const h = Math.floor(totalMin/60)%24, m=totalMin%60;
  return pad(h)+'.'+pad(m);
}
function mkBlock(startMin, durMin, label, sub){
  return { time: fmtClock(startMin)+'–'+fmtClock(startMin+durMin), label, sub };
}

const TAHAP_SHORT = {tahap1:'T1', tahap2:'T2', tahap3:'T3'};

/* Tiap Tahap punya daftar opsi "Kategori — Isi" yang bisa dipilih bebas per hari,
   menggantikan label otomatis yang dulu nggak bisa diganti. */
const FOCUS_OPTIONS = {
  tahap1: {
    'Live Class': ['Verbal', 'Figural & Numerical'],
    'Booster': ['Verbal', 'Numerikal', 'Digit Symbol', 'Diagrammatical'],
    'Tryout': ['TPD (gabungan)']
  },
  tahap2: {
    'Live Class': ['TPU', 'TPK', 'TBIW', 'TBIS'],
    'Materi': ['Master Notes', 'Pra Town Hall'],
    'Booster': ['TPU', 'TPK', 'TBIS', 'TBIW', 'TBIR'],
    'Tryout': ['Gabungan']
  },
  tahap3: {
    'Live Class': ['Interview', 'RGD'],
    'Materi': ['Interview', 'RGD'],
    'Booster': ['Speed Test']
  }
};
const DOW_ORDER = ['Senin','Selasa','Rabu','Kamis','Jumat'];
const DEFAULT_FOCUS_WEEKDAY = {
  tahap1: ['Live Class|Verbal','Live Class|Figural & Numerical','Booster|Verbal','Booster|Numerikal','Booster|Digit Symbol'],
  tahap2: ['Live Class|TPK','Live Class|TBIW','Materi|Master Notes','Materi|Pra Town Hall','Booster|TPU'],
  tahap3: ['Live Class|Interview','Live Class|RGD','Materi|Interview','Materi|RGD','Booster|Speed Test']
};
const DEFAULT_FOCUS_SABTU = {
  tahap1: 'Tryout|TPD (gabungan)',
  tahap2: 'Tryout|Gabungan',
  tahap3: 'CAMPURAN'
};
function focusValueLabel(value){
  if(!value) return '';
  if(value==='CAMPURAN') return 'Campuran / Review';
  const parts = value.split('|');
  return `${parts[0]} \u2014 ${parts[1]}`;
}
function defaultFocusFor(tahapId, dow){
  if(dow==='Sabtu') return DEFAULT_FOCUS_SABTU[tahapId] || 'CAMPURAN';
  const idx = DOW_ORDER.indexOf(dow);
  const list = DEFAULT_FOCUS_WEEKDAY[tahapId];
  if(!list || idx<0) return null;
  return list[idx % list.length];
}
function getDayFocus(key, tahapId, dow){
  const rec = state.days[key];
  if(rec && rec.focus && rec.focus[tahapId]) return rec.focus[tahapId];
  return defaultFocusFor(tahapId, dow);
}
function setDayFocus(key, tahapId, value){
  const rec = dayRecord(key);
  if(!rec.focus) rec.focus = {};
  rec.focus[tahapId] = value;
  scheduleSave();
}
function renderFocusSelect(key, tahapId, currentValue){
  const opts = FOCUS_OPTIONS[tahapId];
  let html = `<select class="focus-select" data-action="set-focus" data-key="${key}" data-tahap="${tahapId}">`;
  Object.keys(opts).forEach(cat=>{
    html += `<optgroup label="${escapeHtml(cat)}">`;
    opts[cat].forEach(sub=>{
      const val = `${cat}|${sub}`;
      html += `<option value="${escapeHtml(val)}" ${currentValue===val?'selected':''}>${escapeHtml(sub)}</option>`;
    });
    html += `</optgroup>`;
  });
  html += `<option value="CAMPURAN" ${currentValue==='CAMPURAN'?'selected':''}>Campuran / Review</option>`;
  html += `</select>`;
  return html;
}
function daySummaryLine(tags, dow, key){
  if(!tags || tags.length===0) return '';
  if(tags.every(t=>t==='libur')) return 'Libur dari konten berkarirBI';
  const pTags = ['tahap1','tahap2','tahap3'].filter(x=>tags.includes(x));
  if(pTags.length===0) return tags.includes('tryout') ? 'Tryout & Review' : '';
  return pTags.map(id=>`${TAHAP_SHORT[id]}: ${focusValueLabel(getDayFocus(key,id,dow))}`).join(' \u00b7 ');
}

function buildDayTimetable(tags, dow, key){
  if(!tags || tags.length===0 || (tags.length===1 && tags[0]==='libur')){
    return [{time:'Sepanjang hari', label:'Libur dari konten berkarirBI', sub:'Catatan YouTube / siaran pers, atau buffer kegiatan pribadi.'}];
  }
  const blocks=[];
  const hasSkripsi = tags.includes('skripsi');
  let t = hasSkripsi ? 450 : 480;

  if(hasSkripsi){
    blocks.push(mkBlock(t,120,'Revisi Skripsi (sesi 1)','')); t+=120;
    blocks.push(mkBlock(t,15,'Istirahat','')); t+=15;
    blocks.push(mkBlock(t,120,'Revisi Skripsi (sesi 2)','Skripsi ±4 jam selesai')); t+=120;
    blocks.push(mkBlock(t,75,'Istirahat siang / makan','')); t+=75;
  }

  const pickLabel = (id)=> `${id==='tahap1'?'Tahap 1':id==='tahap2'?'Tahap 2':'Tahap 3'}: ${focusValueLabel(getDayFocus(key, id, dow))}`;
  let pTags = ['tahap1','tahap2','tahap3'].filter(x=>tags.includes(x));
  if(pTags.length===0) pTags = ['tahap1','tahap2'];

  if(hasSkripsi){
    if(pTags.length===1){
      blocks.push(mkBlock(t,260, pickLabel(pTags[0]), '4 sesi pomodoro 50/10')); t+=260;
    }else{
      blocks.push(mkBlock(t,260, pickLabel(pTags[0]), '4 sesi pomodoro 50/10')); t+=260+10;
      blocks.push(mkBlock(t,120, pickLabel(pTags[1]), '2 sesi pomodoro 50/10')); t+=120;
      if(pTags[2]){ t+=10; blocks.push(mkBlock(t,60, pickLabel(pTags[2]), '~1 sesi, opsional')); t+=60; }
    }
  }else{
    if(pTags.length===1){
      blocks.push(mkBlock(t,260, pickLabel(pTags[0]), '4 sesi pomodoro 50/10')); t+=260;
      blocks.push(mkBlock(t,70,'Istirahat siang / makan','')); t+=70;
      blocks.push(mkBlock(t,260, pickLabel(pTags[0])+' (lanjutan)', '4 sesi pomodoro 50/10')); t+=260;
    }else if(pTags.length===2){
      blocks.push(mkBlock(t,260, pickLabel(pTags[0]), '4 sesi pomodoro 50/10')); t+=260;
      blocks.push(mkBlock(t,70,'Istirahat siang / makan','')); t+=70;
      blocks.push(mkBlock(t,260, pickLabel(pTags[1]), '4 sesi pomodoro 50/10')); t+=260;
    }else{
      blocks.push(mkBlock(t,260, pickLabel(pTags[0]), '4 sesi pomodoro 50/10')); t+=260;
      blocks.push(mkBlock(t,70,'Istirahat siang / makan','')); t+=70;
      blocks.push(mkBlock(t,120, pickLabel(pTags[1]), '2 sesi pomodoro 50/10')); t+=120+10;
      blocks.push(mkBlock(t,120, pickLabel(pTags[2]), '2 sesi pomodoro 50/10')); t+=120;
    }
  }
  const gymStart = 20*60;
  if(t < gymStart) blocks.push(mkBlock(t, gymStart-t, 'Istirahat / makan malam / waktu pribadi',''));
  blocks.push({time:'20.00–23.00', label:'Gym', sub:'Blok tetap', fixed:true});
  return blocks;
}

  document.getElementById('panel-timetable').innerHTML = body;

/* ================= POMODORO ================= */
let pomo = { mode:'idle', remaining:0, endTime:null, running:false, tickHandle:null };

function pomoDurations(){
  return { work: state.pomodoro.work*60, short: state.pomodoro.short*60, long: state.pomodoro.long*60 };
}
function getAudioCtx(){
  if(!window._actx){ try{ window._actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } }
  if(window._actx.state==='suspended') window._actx.resume();
  return window._actx;
}
function beep(){
  const ctx=getAudioCtx(); if(!ctx) return;
  try{
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.frequency.value=880; o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.3);
    o.start(); o.stop(ctx.currentTime+0.32);
  }catch(e){}
}
function fmtTime(sec){
  const m=Math.floor(sec/60), s=sec%60;
  return `${pad(m)}:${pad(s)}`;
}
function modeLabel(m){
  return m==='work' ? 'Fokus' : m==='short' ? 'Istirahat Pendek' : m==='long' ? 'Istirahat Panjang' : 'Siap Mulai';
}
function startTimer(){
  const durations = pomoDurations();
  if(pomo.mode==='idle') pomo.mode='work';
  if(!pomo.remaining) pomo.remaining = durations[pomo.mode] || durations.work;
  pomo.endTime = Date.now() + pomo.remaining*1000;
  pomo.running = true;
  tickLoop();
  renderPomodoro();
}
function pauseTimer(){
  if(pomo.running){ pomo.remaining = Math.max(0, Math.round((pomo.endTime-Date.now())/1000)); }
  pomo.running=false;
  clearInterval(pomo.tickHandle);
  renderPomodoro();
}
function resetTimer(){
  clearInterval(pomo.tickHandle);
  pomo = { mode:'idle', remaining:0, endTime:null, running:false, tickHandle:null };
  renderPomodoro();
}
function skipPhase(){
  if(pomo.mode==='idle') return;
  onPhaseComplete();
}
function tickLoop(){
  clearInterval(pomo.tickHandle);
  pomo.tickHandle = setInterval(()=>{
    if(!pomo.running) return;
    pomo.remaining = Math.max(0, Math.round((pomo.endTime-Date.now())/1000));
    updatePomoDisplay();
    if(pomo.remaining<=0){ onPhaseComplete(); }
  }, 250);
}
function onPhaseComplete(){
  const durations = pomoDurations();
  const dKey = toKey(new Date());
  const rec = dayRecord(dKey);
  if(pomo.mode==='work'){
    rec.pomodoro = (rec.pomodoro||0)+1;
    rec.studied = true;
    rec.cyclesSinceLong = (rec.cyclesSinceLong||0)+1;
    let nextMode, nextRemaining;
    if(rec.cyclesSinceLong >= state.pomodoro.cyclesBeforeLong){
      nextMode='long'; nextRemaining=durations.long; rec.cyclesSinceLong=0;
    }else{
      nextMode='short'; nextRemaining=durations.short;
    }
    beep(); showToast('Sesi fokus selesai — saatnya istirahat 🍵');
    pomo.mode=nextMode; pomo.remaining=nextRemaining; pomo.endTime=Date.now()+nextRemaining*1000; pomo.running=true;
  }else{
    beep(); showToast('Istirahat selesai — lanjut saat siap 💪');
    pomo.mode='work'; pomo.remaining=durations.work; pomo.endTime=null; pomo.running=false;
    clearInterval(pomo.tickHandle);
  }
  scheduleSave();
  renderPomodoro();
  refreshDashboardLive();
  if(document.getElementById('panel-weekly').classList.contains('active') || true){ /* lightweight: re-render weekly only if visited */ }
}
function updatePomoDisplay(){
  const timeEl=document.getElementById('pomoTime');
  if(timeEl) timeEl.textContent = fmtTime(pomo.remaining);
}
function renderPomodoro(){
  const dKey = toKey(new Date());
  const rec = dayRecord(dKey);
  const durations = pomoDurations();
  const remaining = pomo.mode==='idle' ? durations.work : pomo.remaining;
  const modeClass = pomo.mode==='idle' ? 'idle' : pomo.mode;
  const startLabel = pomo.mode==='idle' ? 'Mulai Sesi Fokus' : (pomo.running ? '' : (pomo.mode==='work' ? 'Mulai Sesi Berikutnya' : 'Lanjutkan'));

  document.getElementById('panel-pomodoro').innerHTML = `
    <div class="card pomo-wrap">
      <div class="pomo-mode ${modeClass}">${modeLabel(pomo.mode)}</div>
      <div class="pomo-time mono" id="pomoTime">${fmtTime(remaining)}</div>
      <div class="pomo-sub">Sesi hari ini: <b class="mono">${rec.pomodoro||0}</b> · Siklus ke istirahat panjang: <b class="mono">${rec.cyclesSinceLong||0}/${state.pomodoro.cyclesBeforeLong}</b></div>
      <div class="pomo-controls">
        ${(!pomo.running) ? `<button class="btn btn-primary" data-action="pomo-start">${startLabel || 'Lanjutkan'}</button>` : `<button class="btn btn-secondary" data-action="pomo-pause">Jeda</button>`}
        <button class="btn btn-secondary" data-action="pomo-skip" ${pomo.mode==='idle'?'disabled':''}>Lewati Fase</button>
        <button class="btn btn-secondary" data-action="pomo-reset">Reset</button>
      </div>
      <div class="pomo-settings">
        <div class="section-title" style="margin-top:8px;">Pengaturan Siklus</div>
        <div class="row">
          <label>Fokus (menit)<input type="number" min="1" data-action="set-pomo-cfg" data-key="work" value="${state.pomodoro.work}"></label>
          <label>Istirahat pendek<input type="number" min="1" data-action="set-pomo-cfg" data-key="short" value="${state.pomodoro.short}"></label>
        </div>
        <div class="row">
          <label>Istirahat panjang<input type="number" min="1" data-action="set-pomo-cfg" data-key="long" value="${state.pomodoro.long}"></label>
          <label>Sesi sebelum istirahat panjang<input type="number" min="1" data-action="set-pomo-cfg" data-key="cyclesBeforeLong" value="${state.pomodoro.cyclesBeforeLong}"></label>
        </div>
        <button class="classic-btn" data-action="pomo-classic">Pakai siklus klasik 25-5 (istirahat panjang 15, tiap 4 sesi)</button>
      </div>
      <div class="pomo-note">Default 50-10: cukup panjang untuk masuk fokus dalam materi padat (Master Notes, TPD) tanpa terlalu memforsir, istirahat 10 menit bantu konsolidasi memori. Tiap 4 sesi dapat istirahat panjang 30 menit. Untuk review ringan/booster singkat, coba mode klasik 25-5.</div>
    </div>`;
}

/* ================= EVENT DELEGATION ================= */
function switchTab(tabId){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const btn = document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
  if(btn) btn.classList.add('active');
  const panel = document.getElementById('panel-'+tabId);
  if(panel) panel.classList.add('active');
}
document.getElementById('tabs').addEventListener('click', (e)=>{
  const btn = e.target.closest('.tab-btn'); if(!btn) return;
  switchTab(btn.dataset.tab);
});

document.getElementById('app').addEventListener('click', (e)=>{
  const catHead = e.target.closest('[data-action="toggle-cat"]');
  if(catHead){
    document.querySelector(`.category[data-cat="${catHead.dataset.cat}"]`).classList.toggle('collapsed');
    return;
  }
  const weekHead = e.target.closest('[data-action="toggle-week"]');
  if(weekHead){
    document.querySelector(`.week-card[data-week="${weekHead.dataset.week}"]`).classList.toggle('collapsed');
    return;
  }
  const resetBtn = e.target.closest('[data-action="reset-confirm"]');
  if(resetBtn){
    if(resetBtn.dataset.armed==='1'){
      state = defaultState();
      scheduleSave();
      renderAll();
      showToast('Semua progres direset.');
    }else{
      resetBtn.dataset.armed='1';
      resetBtn.textContent='Yakin? Klik sekali lagi untuk reset total';
      setTimeout(()=>{ resetBtn.dataset.armed='0'; resetBtn.textContent='Reset semua progres'; }, 4000);
    }
    return;
  }
  const pomoStart = e.target.closest('[data-action="pomo-start"]'); if(pomoStart){ startTimer(); return; }
  const pomoPause = e.target.closest('[data-action="pomo-pause"]'); if(pomoPause){ pauseTimer(); return; }
  const pomoSkip = e.target.closest('[data-action="pomo-skip"]'); if(pomoSkip){ skipPhase(); return; }
  const pomoReset = e.target.closest('[data-action="pomo-reset"]'); if(pomoReset){ resetTimer(); return; }
  const pomoClassic = e.target.closest('[data-action="pomo-classic"]');
  if(pomoClassic){
    state.pomodoro = {work:25, short:5, long:15, cyclesBeforeLong:4};
    scheduleSave(); resetTimer();
    showToast('Siklus klasik 25-5 diaktifkan.');
    return;
  }
  const tagChip = e.target.closest('[data-action="toggle-tag"]');
  if(tagChip){
    toggleDayTag(tagChip.dataset.key, tagChip.dataset.tag);
    renderWeekly();
    renderDashboard();
    renderCalendar();
    if(document.getElementById('panel-timetable').classList.contains('active') || ttSelectedKey===tagChip.dataset.key) renderTimetable();
    return;
  }
  const ttPrev = e.target.closest('[data-action="tt-prev"]');
  if(ttPrev){ ttSelectedKey = toKey(addDays(parseKey(ttSelectedKey || toKey(today())), -1)); renderTimetable(); return; }
  const ttNext = e.target.closest('[data-action="tt-next"]');
  if(ttNext){ ttSelectedKey = toKey(addDays(parseKey(ttSelectedKey || toKey(today())), 1)); renderTimetable(); return; }
  const ttToday = e.target.closest('[data-action="tt-today"]');
  if(ttToday){ ttSelectedKey = clampToPlanRange(toKey(today())); renderTimetable(); return; }
  const gotoTT = e.target.closest('[data-action="goto-timetable-today"]');
  if(gotoTT){
    e.preventDefault();
    ttSelectedKey = clampToPlanRange(toKey(today()));
    switchTab('timetable');
    renderTimetable();
    return;
  }
  const calPrev = e.target.closest('[data-action="cal-prev"]');
  if(calPrev){
    calViewMonth--; if(calViewMonth<0){ calViewMonth=11; calViewYear--; }
    renderCalendar(); return;
  }
  const calNext = e.target.closest('[data-action="cal-next"]');
  if(calNext){
    calViewMonth++; if(calViewMonth>11){ calViewMonth=0; calViewYear++; }
    renderCalendar(); return;
  }
  const calToday = e.target.closest('[data-action="cal-today"]');
  if(calToday){
    const base = parseKey(clampToPlanRange(toKey(today())));
    calViewYear = base.getFullYear(); calViewMonth = base.getMonth();
    renderCalendar(); return;
  }
  const calCell = e.target.closest('[data-action="cal-pick"]');
  if(calCell){
    ttSelectedKey = calCell.dataset.key;
    switchTab('timetable');
    renderTimetable();
    return;
  }
});

document.getElementById('app').addEventListener('change', (e)=>{
  const itemCb = e.target.closest('[data-action="toggle-item"]');
  if(itemCb){
    const id = itemCb.dataset.id;
    state.items[id] = itemCb.checked;
    scheduleSave();
    const it = ITEMS_BY_ID[id];
    refreshTahapLive(it.tahap, it.cat);
    refreshDashboardLive();
    return;
  }
  const studiedCb = e.target.closest('[data-action="toggle-studied"]');
  if(studiedCb){
    const rec = dayRecord(studiedCb.dataset.key);
    rec.studied = studiedCb.checked;
    scheduleSave();
    document.querySelectorAll(`[data-action="toggle-studied"][data-key="${studiedCb.dataset.key}"]`).forEach(el=> el.checked = rec.studied);
    return;
  }
  const pomoNum = e.target.closest('[data-action="set-pomo"]');
  if(pomoNum){
    const rec = dayRecord(pomoNum.dataset.key);
    rec.pomodoro = Math.max(0, parseInt(pomoNum.value)||0);
    scheduleSave();
    if(pomoNum.dataset.key===toKey(new Date())) renderPomodoro();
    return;
  }
  const noteInput = e.target.closest('[data-action="set-note"]');
  if(noteInput){
    const rec = dayRecord(noteInput.dataset.key);
    rec.note = noteInput.value;
    scheduleSave();
    return;
  }
  const focusSelect = e.target.closest('[data-action="set-focus"]');
  if(focusSelect){
    setDayFocus(focusSelect.dataset.key, focusSelect.dataset.tahap, focusSelect.value);
    renderCalendar();
    if(document.getElementById('panel-timetable').classList.contains('active')) renderTimetable();
    return;
  }
  const scenarioRadio = e.target.closest('[data-action="set-scenario"]');
  if(scenarioRadio){
    state.scenario = scenarioRadio.value;
    scheduleSave();
    renderDashboard();
    renderWeekly();
    renderCalendar();
    renderTimetable();
    return;
  }
  const pomoCfg = e.target.closest('[data-action="set-pomo-cfg"]');
  if(pomoCfg){
    const v = Math.max(1, parseInt(pomoCfg.value)||1);
    state.pomodoro[pomoCfg.dataset.key] = v;
    scheduleSave();
    if(pomo.mode==='idle') renderPomodoro();
    return;
  }
  const ttPick = e.target.closest('[data-action="tt-pick"]');
  if(ttPick){
    if(ttPick.value){ ttSelectedKey = ttPick.value; renderTimetable(); }
    return;
  }
});

/* ================= INIT ================= */
function renderAll(){
  renderHeaderMeta();
  renderNavCounts();
  renderDashboard();
  renderTahap(1);
  renderTahap(2);
  renderTahap(3);
  renderWeekly();
  renderCalendar();
  renderTimetable();
  renderPomodoro();
}

(async function init(){
  await loadState();
  renderAll();
})();

})();
</script>
